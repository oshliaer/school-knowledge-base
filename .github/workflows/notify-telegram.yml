name: Notify Telegram

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      repository:
        required: true
        type: string
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send message
        run: |
          TEXT="📦 Новый релиз *${{ inputs.tag }}* опубликован\!%0A[Скачать колоды](https://github.com/${{ inputs.repository }}/releases/latest)"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${TEXT}" \
            -d "parse_mode=MarkdownV2" \
            -d "disable_web_page_preview=true"
