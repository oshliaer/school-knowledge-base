name: Build Anki Decks

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tg_message: ${{ steps.tg_message.outputs.message }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Build decks
        run: .venv/bin/python scripts/md2anki.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anki-decks
          path: dist/*.apkg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apkg
          generate_release_notes: true

      - name: Build Telegram message
        if: startsWith(github.ref, 'refs/tags/')
        id: tg_message
        run: |
          MSG=$(.venv/bin/python .github/scripts/build_tg_message.py "${{ github.ref_name }}" "${{ github.repository }}")
          echo "message=${MSG}" >> $GITHUB_OUTPUT

  notify:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    uses: ./.github/workflows/notify-telegram.yml
    with:
      message: ${{ needs.build.outputs.tg_message }}
    secrets:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
